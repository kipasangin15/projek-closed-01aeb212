
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > icon.png
          npm install -g cordova
          cordova create app com.srit.app "Dhhaa"
          cd app
          
          # Membuat ulang config.xml dengan spesifikasi ikon yang jelas
          cat <<EOF > config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.srit.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>Dhhaa</name>
              <description>JMS APK Engine Build</description>
              <content src="index.html" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <preference name="android-minSdkVersion" value="24" />
              <preference name="android-targetSdkVersion" value="34" />
              <platform name="android">
                  <icon src="../icon.png" />
              </platform>
          </widget>
          EOF
          
          cordova platform add android
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#05070a;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Send to James
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*Dhhaa*%20v1.0.0%0A%0AStatus:%20Success%0AOwner:%20James&parse_mode=Markdown"
